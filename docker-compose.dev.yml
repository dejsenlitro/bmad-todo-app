services:
  client:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:3001

  server:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    command: npx tsx --watch src/index.ts
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-todoapp}
      NODE_ENV: development

  db:
    ports:
      - "5432:5432"

volumes:
  client_node_modules:
  server_node_modules:
